<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d0a08">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DJ Academy</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0806;--glass:rgba(28,21,15,.55);--glass2:rgba(20,15,11,.5);--line:rgba(245,197,24,.14);--line2:rgba(255,255,255,.06);--txt:#f7f2e8;--mut:#9c8f7a;--gold:#f5c518;--orange:#ff7a1a;--red:#ef3a3a;--ok:#22c55e}
html,body{background:var(--bg);color:var(--txt);font-family:"DM Sans",sans-serif;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;padding-bottom:calc(74px + env(safe-area-inset-bottom));position:relative;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;z-index:-1;background:
  radial-gradient(60% 45% at 78% 8%,rgba(255,122,26,.16),transparent 70%),
  radial-gradient(55% 40% at 12% 0%,rgba(245,197,24,.13),transparent 70%),
  radial-gradient(70% 50% at 50% 108%,rgba(239,58,58,.10),transparent 70%),var(--bg);pointer-events:none}
h1,h2,.lvl-num,.hero-title,.stat-num{font-family:"Bebas Neue",sans-serif;letter-spacing:.02em}
.wrap{max-width:560px;margin:0 auto}
header{position:sticky;top:0;z-index:10;background:rgba(10,8,6,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:16px 18px 12px;border-bottom:1px solid var(--line2);display:flex;align-items:baseline;gap:10px}
header h1{font-size:28px;background:linear-gradient(90deg,var(--gold),var(--orange),var(--red));-webkit-background-clip:text;background-clip:text;color:transparent}
header .sub{color:var(--mut);font-size:12px}
main{padding:18px}
.card{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--line2);border-radius:22px;padding:20px;margin-bottom:16px;box-shadow:0 8px 30px rgba(0,0,0,.35)}
.card h2{font-size:22px;margin-bottom:14px;color:var(--txt);text-transform:uppercase;letter-spacing:.04em}
/* HERO */
.hero{position:relative;overflow:hidden;padding:26px 22px;border:1px solid var(--line);background:linear-gradient(135deg,rgba(245,197,24,.10),rgba(255,122,26,.05) 45%,rgba(239,58,58,.06))}
.hero::after{content:"";position:absolute;top:-40%;right:-10%;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(255,122,26,.28),transparent 68%);pointer-events:none}
.hero .eyebrow{font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px}
.hero-title{font-size:clamp(46px,11vw,76px);line-height:.92;background:linear-gradient(92deg,var(--gold),var(--orange) 60%,var(--red));-webkit-background-clip:text;background-clip:text;color:transparent}
.hero .lvltag{font-family:"DM Sans",sans-serif;font-size:13px;color:var(--mut);margin-top:10px;position:relative;z-index:1}
.hero .lvltag b{color:var(--txt);font-weight:700}
.hero .bar{margin-top:16px;max-width:none}
.stat-num{color:var(--gold);font-size:15px}
.bar{height:12px;border-radius:99px;background:rgba(0,0,0,.35);border:1px solid var(--line2);overflow:hidden;margin-top:10px;position:relative;z-index:1}
.bar>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--orange),var(--red));box-shadow:0 0 14px rgba(255,122,26,.5);transition:width .5s cubic-bezier(.2,.8,.2,1)}
.pct{font-size:12px;color:var(--mut);margin-top:8px}
.topic{display:flex;align-items:center;gap:12px;padding:12px 8px;border-bottom:1px solid var(--line2);cursor:pointer;user-select:none;border-radius:10px;transition:background .15s}
.topic:last-child{border-bottom:none}
.topic .box{width:24px;height:24px;min-width:24px;border-radius:8px;border:2px solid var(--mut);display:flex;align-items:center;justify-content:center;font-size:15px;color:#0a0806;transition:all .18s}
.topic.done .box{background:var(--ok);border-color:var(--ok);box-shadow:0 0 12px rgba(34,197,94,.4)}
.topic.done .lab{color:var(--mut);text-decoration:line-through}
.topic .lab{font-size:14.5px;line-height:1.35}
.lvl-head{display:flex;align-items:center;gap:14px;cursor:pointer;user-select:none;padding:2px 0}
.lvl-head .lvl-num{font-size:26px;color:var(--gold);min-width:30px;text-align:center}
.lvl-head .t{flex:1}
.lvl-head .t .n{font-weight:700;font-size:16px}
.lvl-head .arrow{color:var(--mut);transition:transform .25s}
.lvl-head.open .arrow{transform:rotate(90deg)}
.lvl-body{margin-top:12px;padding-top:6px;border-top:1px solid var(--line2)}
.card.complete{border-color:rgba(34,197,94,.35)}
.card.complete .lvl-num{color:var(--ok)}
.skill{margin-bottom:18px}
.skill:last-child{margin-bottom:2px}
.skill .row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:8px}
.skill .row b{font-weight:500}
.skill .row span{color:var(--gold);font-weight:700;font-variant-numeric:tabular-nums;font-size:15px}
input[type=range]{width:100%;appearance:none;-webkit-appearance:none;height:12px;border-radius:99px;background:linear-gradient(90deg,var(--gold) 0%,var(--orange) var(--v),rgba(0,0,0,.35) var(--v));border:1px solid var(--line2);outline:none}
input[type=range]::-webkit-slider-thumb{appearance:none;-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;border:3px solid var(--gold);cursor:pointer;box-shadow:0 0 12px rgba(245,197,24,.6)}
textarea{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--line2);border-radius:14px;color:var(--txt);padding:14px;font-family:inherit;font-size:16px;min-height:90px;resize:vertical;transition:border-color .2s}
textarea:focus{border-color:var(--gold);outline:none;box-shadow:0 0 0 3px rgba(245,197,24,.12)}
.btn{display:block;width:100%;margin-top:12px;padding:14px;border:none;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--orange));color:#1a0f00;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;letter-spacing:.02em;transition:transform .15s,box-shadow .2s}
.btn:hover{box-shadow:0 8px 24px rgba(255,122,26,.35);transform:translateY(-1px)}
.btn:active{transform:translateY(0);opacity:.9}
.jentry{padding:14px 0;border-bottom:1px solid var(--line2)}
.jentry:last-child{border-bottom:none}
.jentry .jd{display:flex;justify-content:space-between;font-size:12px;color:var(--mut);margin-bottom:6px}
.jentry .jd button{background:none;border:none;color:var(--red);font-size:12px;cursor:pointer;font-family:inherit}
.jentry .jt{font-size:14.5px;white-space:pre-wrap;line-height:1.5}
.empty{color:var(--mut);font-size:14px;text-align:center;padding:18px 0}
nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(10,8,6,.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--line2);padding-bottom:env(safe-area-inset-bottom);z-index:10}
nav button{flex:1;background:none;border:none;color:var(--mut);padding:11px 0 9px;font-family:inherit;font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s}
nav button .ico{font-size:21px}
nav button.active{color:var(--gold)}
.next-topic{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--line2);border-radius:14px;margin-bottom:10px;cursor:pointer;background:rgba(0,0,0,.2);transition:transform .15s,border-color .2s,background .2s}
.next-topic:hover{border-color:var(--line);background:rgba(245,197,24,.05)}
.next-topic .dot{width:9px;height:9px;min-width:9px;border-radius:50%;background:var(--orange);box-shadow:0 0 10px var(--orange)}
.next-topic .lab{font-size:14.5px}
.next-topic .lvl{margin-left:auto;font-size:11px;color:var(--gold);white-space:nowrap;font-weight:600}
.topic .go{margin-left:auto;color:var(--gold);font-size:22px;line-height:1;opacity:.7;transition:transform .15s,opacity .15s}
.topic:hover .go{opacity:1;transform:translateX(3px)}
.topic .box{cursor:pointer}
.lesson-back{color:var(--mut);font-size:14px;cursor:pointer;padding:4px 2px 14px;display:inline-block;transition:color .2s;font-weight:600}
.lesson-back:hover{color:var(--gold)}
.lesson-sec .ltxt{font-size:15px;line-height:1.6;white-space:pre-line;color:#e9e0d0}
.viz{font-family:ui-monospace,"Cascadia Code",Consolas,monospace;font-size:12.5px;line-height:1.5;white-space:pre;overflow-x:auto;background:rgba(0,0,0,.35);border:1px solid var(--line2);border-radius:14px;padding:16px;color:var(--gold)}
.btn-done{background:linear-gradient(90deg,var(--ok),#16a34a);color:#04210f}
@media(min-width:900px){
body{padding:0 0 48px 260px}
.wrap{max-width:none;margin:0}
header{display:none}
nav{left:0;top:0;bottom:0;right:auto;width:260px;flex-direction:column;justify-content:flex-start;gap:5px;border-top:none;border-right:1px solid var(--line2);padding:0 14px;background:rgba(10,8,6,.6)}
nav::before{content:"DJ ACADEMY";display:block;font-family:"Bebas Neue",sans-serif;letter-spacing:.03em;font-size:34px;padding:30px 12px 22px;background:linear-gradient(90deg,var(--gold),var(--orange),var(--red));-webkit-background-clip:text;background-clip:text;color:transparent}
nav button{flex:0 0 auto;flex-direction:row;justify-content:flex-start;gap:14px;width:100%;padding:14px 16px;font-size:14.5px;border-radius:14px}
nav button .ico{font-size:20px}
nav button:hover{color:var(--txt);background:rgba(245,197,24,.06)}
nav button.active{background:rgba(245,197,24,.1);color:var(--gold)}
main{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:22px;align-items:start;padding:40px 48px;max-width:1500px}
.card{margin-bottom:0}
.card:has(.hero),.hero{grid-column:1/-1}
.hero{padding:44px 40px}
.hero::after{width:420px;height:420px;top:-50%}
.hero .bar{max-width:60%}
.card h2{font-size:23px}
.topic:hover{background:rgba(245,197,24,.05)}
.card:hover{border-color:var(--line)}
main.lesson-view{display:block;max-width:820px;margin:0 auto;padding:40px 48px}
main.lesson-view .hero-title{font-size:clamp(32px,5vw,52px)}
}
</style>
</head>
<body>
<div class="wrap">
<header><h1>DJ ACADEMY</h1><span class="sub">Dein Weg zum Pro-DJ</span></header>
<main id="root"></main>
</div>
<nav id="nav"></nav>
<script>
const KEY="dj-academy";
const LEVELS=[
  {n:"Orientierung",e:"🎧",topics:[
    {t:"Was macht ein DJ? Rolle & Aufgaben verstehen",l:{
      why:`Ein DJ ist kein Musik-Abspieler, sondern ein Kurator und Energie-Manager. Du hast drei Kern-Jobs:\n\n1. Track-Auswahl — die richtigen Songs für den Moment finden.\n2. Mixing — sie technisch sauber ineinander überführen.\n3. Energie-Management — einen Spannungsbogen über die ganze Session bauen.\n\nDie Technik (Beatmatching, EQ) ist nur das Werkzeug. Das eigentliche Ziel: Die Leute tanzen durch, ohne zu merken, wann ein Song endet und der nächste anfängt.`,
      viz:`Energie-Verlauf eines Sets:\n\n hoch │              ╱‾‾‾╲\n      │         ╱‾‾‾╯    ╲\n      │    ╱‾‾‾╯          ╲___\n niedr │‾‾╯\n      └────────────────────────► Zeit\n       Warmup   Aufbau  Peak  Ausklang`,
      ex:`Auf einem Twitch-Warmup startest du mit ruhigem Deep House (🟢 Low), ziehst über Tech House (🟡 Mid) hoch und drehst zur Primetime auf treibenden Techno (🔴 High) auf. Am Ende fährst du wieder runter.`,
      task:`Hör dir ein 60-Minuten-Set an (z.B. ein Boiler Room auf YouTube). Achte NUR auf die Energie: Wo wird's treibender, wo baut der DJ ab? Notier dir 3 Stellen, an denen du einen Übergang bemerkst.`,
      hw:`Schreib in EINEM Satz auf, welcher DJ-Typ du sein willst — Warmup-Groove, Peaktime-Energie oder Vocal-Party. Das bestimmt später deine Track-Auswahl.`}},
    {t:"Equipment & Aufbau eines DJ-Setups verstehen",l:{
      why:`Jedes DJ-Setup hat dieselben vier Bausteine — egal ob 200-Euro-Controller oder 20.000-Euro-Club-Booth:\n\n1. Source — die Musik (bei dir: Rekordbox am Laptop).\n2. Controller/Mixer — dein FLX4, der Decks und Mixer in einem Gerät vereint.\n3. Master Out — das Signal, das rausgeht (zur JBL PartyBox).\n4. Kopfhörer — zum Vorhören (Cueing), nur du hörst das.`,
      viz:`[Laptop / Rekordbox]\n        │  USB-C\n     [DDJ-FLX4]\n        │  Master Out (Cinch)\n   [JBL PartyBox]        [Kopfhörer]\n    (Publikum)         └ vorne am FLX4 (nur du)`,
      ex:`Dein konkretes Setup: Gaming-Notebook per USB-C an den FLX4, Cinch aus Master Out in den AUX-Eingang der JBL PartyBox (nur Kabel — Bluetooth hätte zu viel Latenz), Logitech-Headset per Klinke vorne in den FLX4.`,
      task:`Bau dein komplettes Setup einmal auf und wieder ab. Ziel: unter 5 Minuten, ohne nachzudenken, welches Kabel wohin gehört.`,
      hw:`Zeichne dein Setup als kleine Skizze mit allen Kabeln. Wenn du es aufzeichnen kannst, verstehst du den Signalweg.`}},
    {t:"DDJ-FLX4 anschließen & in Rekordbox einrichten",l:{
      why:`Der FLX4 wird per USB-C an den Laptop angeschlossen und schaltet Rekordbox automatisch frei. Rekordbox startet im PERFORMANCE-Modus, der Controller wird erkannt. Wichtig sind drei Verbindungen: USB zum Laptop (Steuerung + Audio), Master Out zur Box (Ton fürs Publikum), Kopfhörer vorne (Cueing).`,
      viz:`FLX4 Rückseite:\n [USB-C] → Laptop\n [MASTER OUT / Cinch] → JBL AUX\n\nFLX4 Vorderseite:\n [PHONES / Klinke] → Logitech-Headset`,
      ex:`In den Rekordbox-Audio-Settings wählst du den DDJ-FLX4 als Audiogerät. Kopfhörer per Klinke direkt vorne rein — nicht den USB-Funk-Dongle des Headsets nutzen, der bringt Latenz.`,
      task:`Schließ den FLX4 an, öffne Rekordbox und prüf: Wird der Controller erkennt (leuchten die Buttons)? Kommt Ton aus der JBL, wenn du einen Track auf Deck 1 startest? Hörst du im Kopfhörer, wenn du CUE drückst?`,
      hw:`Notier dir im Journal, ob alles auf Anhieb lief — oder wo es gehakt hat. Solche Setup-Notizen sparen dir beim nächsten Mal Zeit.`}},
    {t:"Rekordbox-Oberfläche kennenlernen",l:{
      why:`Rekordbox hat zwei Modi: EXPORT (Bibliothek verwalten und Tracks vorbereiten) und PERFORMANCE (live auflegen). Im Performance-Modus gibt es drei Zonen:\n\n- Oben: die zwei Decks mit Waveform, BPM, Tonart (Key) und Zeit.\n- Mitte: der Mixer mit EQ, Kanal-Fadern und Crossfader.\n- Unten: der Browser mit deinen Playlists und Tracks.\n\nDie große Waveform ist deine Musik als Bild: hohe Ausschläge = laut, die farbigen Anteile zeigen Bass, Mitten und Höhen.`,
      viz:`┌──── DECK 1 ────┬──── DECK 2 ────┐\n│ Waveform BPM Key│ Waveform BPM Key│\n├───────── MIXER ─┴────────────────┤\n│  EQ(HI/MID/LOW)  Fader  Crossfad. │\n├──────── BROWSER ─────────────────┤\n│ Playlists │ Track-Liste          │\n└──────────────────────────────────┘`,
      ex:`Wenn du einen Track lädst, siehst du sofort die Waveform. Ein ruhiges Intro sieht dünn aus, der Drop ist ein dicker, voller Block. So erkennst du die Struktur eines Songs, bevor du ihn überhaupt gehört hast.`,
      task:`Lad einen Track auf Deck 1 und finde jedes Element: Wo steht die BPM? Wo die Tonart? Wo ist der EQ, wo der Kanal-Fader, wo der Crossfader? Zeig mit dem Finger auf jedes.`,
      hw:`Spiel 10 Minuten in Rekordbox herum, ohne Ziel. Klick alles an. Vertrautheit mit dem Werkzeug kommt durchs Anfassen, nicht durchs Lesen.`}},
    {t:"Musik importieren, analysieren & organisieren",l:{
      why:`Ordnung in der Bibliothek ist die halbe Miete — im Set willst du Tracks finden, nicht suchen. Beim Import analysiert Rekordbox automatisch BPM, Tonart und Beatgrid. Danach bereitest du jeden Track vor: Grid prüfen, Hot Cues setzen, mit My-Tags nach Energie markieren.\n\nDetaillierte Struktur (Drei-Säulen House/Techno/RnB, My-Tag-System, Hot-Cue-Farben) steht in deinem Vault-Guide „Musikbibliothek & Mixing-Basics".`,
      viz:`Hot-Cue-Farbsystem:\n 🟢 Grün  = Start des mixbaren Beats (Intro)\n 🔴 Rot   = Drop / hier startet der Song richtig\n 🟡 Gelb  = Outro / Startpunkt für den Übergang`,
      ex:`Import-Routine: Track reinziehen → Rekordbox analysiert → Grid-Check (liegt das Raster genau auf den Kicks?) → grünen Hot Cue auf den ersten sauberen Beat → gelben auf den Outro-Start → My-Tag 🟢/🟡/🔴 je nach Energie.`,
      task:`Importier 5 Tracks (z.B. aus der Übungs-Playlist deines Guides) und bereite jeden komplett vor: Grid checken, mindestens einen Hot Cue setzen, Energie-Tag vergeben.`,
      hw:`Leg deine Drei-Säulen-Ordnerstruktur an (House / Techno / RnB) und sortier deine ersten Tracks ein. Eine saubere Basis wächst leichter mit.`}}
  ]},
  {n:"DJ-Grundlagen",e:"🥁",topics:[
    {t:"BPM & Beat verstehen",l:{
      why:`BPM steht für „Beats Per Minute" — das Tempo eines Tracks. Der Beat ist der Puls, auf den du mit dem Fuß wippst, meistens die Kickdrum (das „Bumm").\n\nTypische Bereiche: House 120–128 BPM, Techno 126–140, RnB 90–105. Warum das zählt: Zwei Tracks mit gleicher BPM laufen synchron. Bei unterschiedlicher BPM driften sie auseinander — das hörst du als „eiern". Rekordbox zeigt die BPM groß im Deck an.`,
      viz:`1 Takt (4 Beats) bei 124 BPM:\n\nKick:  X . . . X . . . X . . . X . . .\nZähl:  1       2       3       4\n       └──────── ~2 Sekunden ────────┘`,
      ex:`Fisher – „Losing It" liegt bei ~125 BPM. Amelie Lens – „Purge" ist schneller (~140). Legst du die direkt übereinander, ohne die BPM anzugleichen, laufen die Kicks sofort auseinander.`,
      task:`Lad drei Tracks und lies die BPM ab. Dann wipp bei jedem mit dem Fuß auf die Kickdrum mit — spür den Unterschied zwischen 124 und 140 BPM körperlich.`,
      hw:`Rate bei drei Lieblings-Tracks die BPM, bevor du sie lädst (House ~125, Techno ~132, RnB ~95 als Anker). Dann checken. Dein Gefühl fürs Tempo wird mit der Zeit erstaunlich genau.`}},
    {t:"Takt & Bars zählen (4/4)",l:{
      why:`Fast alle Tanzmusik steht im 4/4-Takt: vier Schläge pro Takt. Du zählst „1-2-3-4, 1-2-3-4". Die „1" ist immer die betonteste — dort sitzt die Kick am stärksten.\n\nEin Takt (englisch „Bar") = 4 Beats. Das ist die kleinste Bau-Einheit der Musik. Alles Größere (Phrasen, ganze Tracks) besteht aus Takten.`,
      viz:`  1   2   3   4  │  1   2   3   4\n  ▓   ·   ·   ·  │  ▓   ·   ·   ·\n  ↑              │  ↑\n"Eins" (betont)  │  nächster Takt`,
      ex:`Zähl bei „Losing It" laut mit: 1-2-3-4. Du merkst, dass die „1" sich anders anfühlt — schwerer, betonter. Genau darauf steigst du später beim Mixen ein.`,
      task:`Spiel einen House-Track und zähl 8 Takte am Stück laut mit (1-2-3-4, achtmal). Bleib im Takt, ohne dich zu verzählen. Wiederhol das, bis es sicher sitzt.`,
      hw:`Zähl bei jedem Song, den du heute nebenbei hörst, kurz die Takte mit. Das Taktgefühl ist die Grundlage für absolut alles Weitere.`}},
    {t:"Phrasen erkennen (16/32 Bars)",l:{
      why:`Elektronische Musik ist mathematisch gebaut. Das Grundgesetz: Alle 8 Takte (= 32 Beats) passiert etwas Neues. So ein Block heißt Phrase. Bei ~126 BPM dauert eine 8-Takt-Phrase etwa 15 Sekunden.\n\nTracks bestehen aus aneinandergereihten Phrasen: Intro, Aufbau, Drop, Break, Drop, Outro. Der entscheidende Punkt: Du mixt IMMER auf Phrasengrenzen — sonst klingt der Übergang schief, egal wie sauber die Beats liegen.`,
      viz:`Track-Struktur (jeder Block = 8/16 Takte):\n\n[ INTRO ][ BUILD ][ DROP ][ BREAK ][ DROP ][ OUTRO ]\n  mixbar          Energie          Energie   mixbar\n\nNeuer Block = neue „Eins" = hier steigst du ein`,
      ex:`In „Losing It" hörst du deutlich, wie sich alle paar Sekunden etwas ändert: ein Element kommt dazu, die Spannung steigt, dann der Drop. Jede dieser Grenzen ist eine Phrasengrenze.`,
      task:`Spiel einen House-Track und zähl in 8er-Blöcken: 8 Takte, dann fängst du wieder bei 1 an. Achte darauf, dass dein Zählen mit den musikalischen Wechseln zusammenfällt. Rekordbox zeigt die Phrasen oben an — nutz das zum Kontrollieren.`,
      hw:`Such in einem Track das Intro, den ersten Drop, den Break und den zweiten Drop. Merk dir grob, nach wie vielen Phrasen der Drop kommt — meist nach 4 oder 8.`}},
    {t:"Cueing & Vorhören über Kopfhörer",l:{
      why:`Cueing heißt: Du hörst den nächsten Track im Kopfhörer vor, während das Publikum noch Track A hört. So findest du in Ruhe den Einstiegspunkt und richtest die Beats aus, ohne dass jemand einen Fehler mitbekommt.\n\nAm FLX4 drückst du dazu die CUE-Taste (Kopfhörer-Symbol) am jeweiligen Kanal. Der MIX/BALANCE-Regler am Kopfhörer-Ausgang mischt zwischen Vorhören (Cue) und dem, was rausgeht (Master).`,
      viz:`        ┌──────────────┐\nDeck A ─┤              ├─► MASTER ─► JBL (Publikum)\n        │  FLX4 Mixer  │\nDeck B ─┤  [CUE] ──────┼─► KOPFHÖRER (nur du)\n        └──────────────┘`,
      ex:`Track A läuft für den Raum. Du drückst CUE auf Kanal 2, hörst Track B nur im Kopfhörer, suchst den ersten sauberen Beat und machst ihn spielbereit — alles unhörbar für die Tanzfläche.`,
      task:`Spiel Track A über die Box. Lad Track B auf Deck 2, drück CUE auf Kanal 2 und hör ihn NUR im Kopfhörer. Spiel mit dem MIX-Regler: ganz auf Cue, ganz auf Master, und die Mischung dazwischen.`,
      hw:`Übe, den Kopfhörer schnell auf- und abzusetzen und dabei CUE zu treffen — diese Handbewegung machst du in jedem Set hunderte Male.`}},
    {t:"Jogwheel-Basics (Nudge & Scratch-Mode)",l:{
      why:`Das Jogwheel (das große Rad) hat zwei Funktionen. Im Vinyl-/Scratch-Modus stoppt oder scratcht ein Berühren der Oberseite den Track. Fürs Mixen wichtiger ist das Nudgen an der Rad-Seite: ein kurzer Schubs macht den Track minimal schneller oder langsamer, um Beats exakt auszurichten.\n\nLäuft ein Track vor (zu schnell), bremst du ihn kurz gegen die Laufrichtung. Läuft er nach (zu langsam), schubst du in Laufrichtung nach.`,
      viz:`Track läuft VOR (zu schnell):\n  → Rad-Seite kurz GEGEN die Laufrichtung = bremsen\n\nTrack läuft NACH (zu langsam):\n  → Rad-Seite IN Laufrichtung schubsen = schneller`,
      ex:`Beim Beatmatchen hörst du, dass die Kick von Track B einen Tick zu früh kommt. Du legst zwei Finger seitlich ans Jogwheel und bremst kurz — schon sitzen die Kicks wieder aufeinander.`,
      task:`Spiel einen Track und experimentier mit dem Jogwheel: Oberseite berühren (Stopp/Scratch) vs. Seite antippen (Nudge). Spür den Unterschied zwischen einem harten Stopp und einem sanften Nudge.`,
      hw:`Nudge ist Feingefühl, keine Kraft. Übe ganz kleine, kurze Antipper — je feiner deine Nudges, desto unhörbarer deine Korrekturen.`}},
    {t:"Sync verstehen — was er tut und wann nicht",l:{
      why:`Die SYNC-Taste (gelb am FLX4) gleicht BPM und Beatgrid der beiden Tracks automatisch an. Das zu nutzen ist völlig normal und Standard — kein „Cheaten". Es nimmt dir die stumpfe Tempo-Arbeit ab, damit du dich aufs Musikalische konzentrieren kannst.\n\nAber: Sync ist nur so gut wie das Beatgrid. Liegt das Grid falsch (oft bei RnB oder Tracks mit echten Drums), driftet es trotzdem. Und Sync ersetzt NICHT das Phrasing (WANN du mixt) und nicht deine Ohren. Lern beides — Sync für die BPM, dein Gehör fürs Timing.`,
      viz:`SYNC macht:        SYNC macht NICHT:\n ✓ BPM angleichen    ✗ Phrasing (wann)\n ✓ Beatgrid koppeln  ✗ Track-Auswahl\n                     ✗ Grid-Fehler heilen`,
      ex:`Zwei sauber gegridde House-Tracks: SYNC drücken, beide laufen perfekt parallel. Bei einem RnB-Track mit live eingespielten Drums kann SYNC danebenliegen — dann musst du mit dem Jogwheel manuell nachhelfen.`,
      task:`Leg zwei House-Tracks auf, drück auf beiden SYNC und starte sie zusammen auf einer Phrasengrenze. Hör, wie sie parallel laufen. Dann probier dasselbe mit einem RnB-Track und achte, ob es driftet.`,
      hw:`Verlass dich nicht blind auf Sync. Prüf mit den Ohren, ob die Kicks wirklich aufeinander sitzen — die gelbe Taste ist ein Helfer, nicht dein Ersatz-Gehör.`}}
  ]},
  {n:"Beatmatching",e:"🎚️",topics:[{t:"Tempo per Pitch-Fader angleichen"},{t:"Beats per Jogwheel angleichen"},{t:"Manuelles Beatmatching ohne Sync"},{t:"Drift hören & live korrigieren"}]},
  {n:"Mixing-Grundlagen",e:"🎛️",topics:[{t:"Gain-Staging (Pegel sauber einstellen)"},{t:"EQ-Grundlagen: Low / Mid / High"},{t:"Bass-Swap-Technik"},{t:"Filter gezielt einsetzen"},{t:"Lautstärke & Headroom verstehen"},{t:"Erster komplett sauberer Übergang"}]},
  {n:"Profi-Übergänge",e:"🔀",topics:[{t:"Phrase-Mixing in der Praxis"},{t:"Energie lesen & gezielt aufbauen"},{t:"Track-Auswahl fürs Mixing"},{t:"Drei Übergangstechniken sicher beherrschen"}]},
  {n:"Harmonic Mixing",e:"🎼",topics:[{t:"Tonarten-Basics (Dur/Moll)"},{t:"Camelot Wheel verstehen & anwenden"},{t:"Key-Analyse in Rekordbox nutzen"},{t:"Harmonische Übergänge üben"}]},
  {n:"Creative DJing",e:"✨",topics:[{t:"Loops kreativ einsetzen"},{t:"FX dosieren (Echo, Reverb, Filter)"},{t:"Layering & Acapellas"},{t:"Eigenen Mashup-Moment bauen"}]},
  {n:"Profi-Sets",e:"🎪",topics:[{t:"Set-Dramaturgie planen"},{t:"Energieverlauf über 60 Minuten steuern"},{t:"Komplettes Set aufnehmen"},{t:"Eigenes Set kritisch analysieren"}]},
  {n:"Streaming DJ",e:"📡",topics:[{t:"OBS-Szenen & Overlays bauen"},{t:"Audio-Routing (Rekordbox → OBS) live testen"},{t:"Kamera & Licht einrichten"},{t:"Branding & Kanal-Design"},{t:"Erster Test-Stream"},{t:"Community-Aufbau starten"}]}
];
const SKILLS=["Beatmatching","EQ & Mixing","Phrasing","Harmonic Mixing","Set-Aufbau","Streaming-Setup"];
let D=load();
let S={view:"dash",open:{},journalText:"",lesson:null};

function load(){
  try{const d=JSON.parse(localStorage.getItem(KEY));if(d&&d.done)return d;}catch(e){}
  const skills={};SKILLS.forEach(s=>skills[s]=0);
  return {done:{},skills:skills,journal:[]};
}
function save(){localStorage.setItem(KEY,JSON.stringify(D));}
function set(p){S=Object.assign({},S,p);render();}

function div(cls){const d=document.createElement("div");if(cls)d.className=cls;return d;}
function el(tag,cls,text){const e=document.createElement(tag);if(cls)e.className=cls;if(text!=null)e.textContent=text;return e;}

function levelProgress(li){
  const t=LEVELS[li].topics;const done=t.filter((_,i)=>D.done[li+"-"+i]).length;
  return {done:done,total:t.length,pct:Math.round(done/t.length*100)};
}
function totalProgress(){
  let done=0,total=0;
  LEVELS.forEach((l,li)=>{total+=l.topics.length;l.topics.forEach((_,i)=>{if(D.done[li+"-"+i])done++;});});
  return {done:done,total:total,pct:total?Math.round(done/total*100):0};
}
function currentLevel(){
  for(let i=0;i<LEVELS.length;i++){if(levelProgress(i).pct<100)return i;}
  return LEVELS.length-1;
}
function toggleTopic(key){
  if(D.done[key])delete D.done[key];else D.done[key]=true;
  save();render();
}

function renderDash(root){
  const cl=currentLevel(),tp=totalProgress(),lp=levelProgress(cl);
  const hero=div("card hero");
  hero.appendChild(el("div","eyebrow","Level "+cl+" · Aktuell"));
  hero.appendChild(el("div","hero-title",LEVELS[cl].e+" "+LEVELS[cl].n));
  const tag=div("lvltag");tag.innerHTML=lp.done+" / "+lp.total+" Themen in diesem Level abgeschlossen";
  hero.appendChild(tag);
  const b=div("bar");const bi=el("i");bi.style.width=lp.pct+"%";b.appendChild(bi);hero.appendChild(b);
  root.appendChild(hero);

  const total=div("card");
  const th=div("hrow");th.appendChild(el("h2",null,"Gesamt-Fortschritt"));th.appendChild(el("div","stat-num",tp.pct+"%"));
  th.style.cssText="display:flex;justify-content:space-between;align-items:center";
  total.appendChild(th);
  const tb=div("bar");const tbi=el("i");tbi.style.width=tp.pct+"%";tb.appendChild(tbi);total.appendChild(tb);
  total.appendChild(el("div","pct",tp.done+" von "+tp.total+" Themen abgeschlossen"));
  root.appendChild(total);

  const next=div("card");next.appendChild(el("h2",null,"Nächste Schritte"));
  const open=[];
  outer:for(let li=cl;li<LEVELS.length;li++){
    for(let i=0;i<LEVELS[li].topics.length;i++){
      if(!D.done[li+"-"+i]){open.push({li:li,i:i});if(open.length>=3)break outer;}
    }
  }
  if(!open.length){next.appendChild(el("div","empty","Alles abgehakt — du bist durch! 🎉"));}
  open.forEach(o=>{
    const topic=LEVELS[o.li].topics[o.i];
    const nt=div("next-topic");nt.appendChild(div("dot"));
    nt.appendChild(el("div","lab",topic.t));
    nt.appendChild(el("div","lvl",topic.l?"Lektion ›":"Lvl "+o.li));
    nt.onclick=topic.l?()=>set({view:"lesson",lesson:{li:o.li,i:o.i}}):()=>toggleTopic(o.li+"-"+o.i);
    next.appendChild(nt);
  });
  root.appendChild(next);

  const sk=div("card");sk.appendChild(el("h2",null,"Skills (Selbsteinschätzung)"));
  SKILLS.forEach(name=>{
    const w=div("skill");const row=div("row");
    row.appendChild(el("b",null,name));const val=el("span",null,D.skills[name]+"%");row.appendChild(val);
    const r=document.createElement("input");r.type="range";r.min=0;r.max=100;r.step=5;r.value=D.skills[name];
    r.style.setProperty("--v",D.skills[name]+"%");
    r.oninput=()=>{D.skills[name]=+r.value;val.textContent=r.value+"%";r.style.setProperty("--v",r.value+"%");};
    r.onchange=()=>save();
    w.appendChild(row);w.appendChild(r);sk.appendChild(w);
  });
  root.appendChild(sk);
}

function renderPath(root){
  LEVELS.forEach((l,li)=>{
    const lp=levelProgress(li);
    const c=div("card"+(lp.pct===100?" complete":""));
    const head=div("lvl-head"+(S.open[li]?" open":""));
    head.appendChild(el("div","lvl-num",String(li)));
    const t=div("t");t.appendChild(el("div","n",l.e+" "+l.n));
    const b=div("bar");const bi=el("i");bi.style.width=lp.pct+"%";b.appendChild(bi);t.appendChild(b);
    head.appendChild(t);
    head.appendChild(el("div","arrow","▶"));
    head.onclick=()=>{S.open[li]=!S.open[li];render();};
    c.appendChild(head);
    if(S.open[li]){
      const body=div("lvl-body");
      l.topics.forEach((topic,i)=>{
        const key=li+"-"+i;
        const row=div("topic"+(D.done[key]?" done":""));
        const box=el("div","box",D.done[key]?"✓":"");
        box.onclick=(e)=>{e.stopPropagation();toggleTopic(key);};
        row.appendChild(box);
        row.appendChild(el("div","lab",topic.t));
        if(topic.l){row.appendChild(el("div","go","›"));row.onclick=()=>set({view:"lesson",lesson:{li:li,i:i}});}
        else{row.onclick=()=>toggleTopic(key);}
        body.appendChild(row);
      });
      c.appendChild(body);
    }
    root.appendChild(c);
  });
}

function renderJournal(root){
  const form=div("card");form.appendChild(el("h2",null,"Neue Übungs-Session"));
  const ta=document.createElement("textarea");
  ta.placeholder="Was hast du geübt? Was lief gut, was noch nicht?";
  ta.value=S.journalText;
  ta.oninput=()=>{S.journalText=ta.value;};
  form.appendChild(ta);
  const btn=el("button","btn","Session speichern");
  btn.onclick=()=>{
    const t=S.journalText.trim();if(!t)return;
    D.journal.unshift({id:Date.now(),date:new Date().toISOString().slice(0,10),text:t});
    save();set({journalText:""});
  };
  form.appendChild(btn);root.appendChild(form);

  const list=div("card");list.appendChild(el("h2",null,"Übungs-Log"));
  if(!D.journal.length)list.appendChild(el("div","empty","Noch keine Einträge — nach der ersten Session am FLX4 geht's hier los."));
  D.journal.forEach(j=>{
    const e=div("jentry");const jd=div("jd");
    jd.appendChild(el("span",null,j.date));
    const del=el("button",null,"löschen");
    del.onclick=()=>{if(confirm("Eintrag löschen?")){D.journal=D.journal.filter(x=>x.id!==j.id);save();render();}};
    jd.appendChild(del);
    e.appendChild(jd);e.appendChild(el("div","jt",j.text));
    list.appendChild(e);
  });
  root.appendChild(list);
}

function renderLesson(root){
  const li=S.lesson.li,i=S.lesson.i,topic=LEVELS[li].topics[i],L=topic.l,key=li+"-"+i,done=!!D.done[key];
  const back=el("div","lesson-back","‹ Zurück zum Lernpfad");back.onclick=()=>set({view:"path"});root.appendChild(back);
  const hero=div("card hero");
  hero.appendChild(el("div","eyebrow","Level "+li+" · "+LEVELS[li].n));
  hero.appendChild(el("div","hero-title",LEVELS[li].e+" "+topic.t));
  root.appendChild(hero);
  const sec=(icon,label,text,pre)=>{
    const c=div("card lesson-sec");
    c.appendChild(el("h2",null,icon+"  "+label));
    c.appendChild(el(pre?"pre":"div",pre?"viz":"ltxt",text));
    root.appendChild(c);
  };
  sec("💡","Erklärung",L.why);
  if(L.viz)sec("📊","Visualisierung",L.viz,true);
  if(L.ex)sec("🎧","In der Praxis",L.ex);
  sec("🎛️","Deine Übung",L.task);
  sec("📝","Hausaufgabe",L.hw);
  const dc=div("card");
  const btn=el("button","btn"+(done?" btn-done":""),done?"✓ Erledigt — als offen markieren":"Als erledigt markieren");
  btn.onclick=()=>{if(D.done[key])delete D.done[key];else D.done[key]=true;save();render();};
  dc.appendChild(btn);root.appendChild(dc);
}

function render(){
  const root=document.getElementById("root");root.innerHTML="";
  root.className=S.view==="lesson"?"lesson-view":"";
  if(S.view==="dash")renderDash(root);
  else if(S.view==="path")renderPath(root);
  else if(S.view==="lesson")renderLesson(root);
  else renderJournal(root);
  const nav=document.getElementById("nav");nav.innerHTML="";
  const activeView=S.view==="lesson"?"path":S.view;
  [["dash","🎛️","Dashboard"],["path","🗺️","Lernpfad"],["journal","📓","Journal"]].forEach(([v,ico,lab])=>{
    const b=document.createElement("button");if(activeView===v)b.className="active";
    const i=el("div","ico",ico);b.appendChild(i);b.appendChild(el("div",null,lab));
    b.onclick=()=>set({view:v});
    nav.appendChild(b);
  });
}

(function(){
  if("serviceWorker" in navigator)navigator.serviceWorker.register("./sw.js").catch(()=>{});
  render();
})();
</script>
</body>
</html>
